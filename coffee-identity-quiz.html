<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>咖啡身份认领测试 | 你是哪种咖啡人？</title>
  <meta name="description" content="15道题测出你的咖啡人格！美式孤勇者？拿铁什么拿不住？来认领你的咖啡身份！">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☕</text></svg>">
  <style>
    :root {
      --coffee-darkest: #2A1A0E;
      --coffee-dark: #3E2723;
      --coffee-primary: #5D4037;
      --coffee-medium: #795548;
      --coffee-light: #A1887F;
      --coffee-lighter: #D7CCC8;
      --caramel: #D4A574;
      --caramel-light: #F5CBA7;
      --cream: #FEF9EF;
      --white: #FFFFFF;
      --shadow: 0 4px 20px rgba(42, 26, 14, 0.15);
      --shadow-strong: 0 8px 32px rgba(42, 26, 14, 0.25);
      --radius: 16px;
      --radius-sm: 10px;
      --font-main: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-main);
      background: linear-gradient(135deg, var(--coffee-darkest) 0%, var(--coffee-dark) 50%, var(--coffee-primary) 100%);
      color: var(--cream);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    #app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      position: relative;
      background: linear-gradient(180deg, var(--coffee-darkest) 0%, #1A0F08 100%);
    }
    .header { text-align: center; padding: 24px 20px 16px; position: relative; }
    .header-icon { font-size: 48px; display: block; margin-bottom: 8px; animation: floatBean 3s ease-in-out infinite; }
    @keyframes floatBean { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-8px) rotate(3deg); } }
    .header h1 { font-size: 22px; font-weight: 900; background: linear-gradient(135deg, var(--caramel) 0%, var(--caramel-light) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: 1px; }
    .header p { font-size: 13px; color: var(--coffee-lighter); margin-top: 6px; font-weight: 300; }
    .progress-wrap { padding: 0 20px; margin-bottom: 20px; }
    .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--caramel) 0%, var(--caramel-light) 100%); border-radius: 3px; transition: width 0.4s ease; }
    .progress-text { text-align: right; font-size: 12px; color: var(--coffee-light); margin-top: 6px; }
    .question-card {
      background: rgba(255,255,255,0.06); backdrop-filter: blur(10px);
      border: 1px solid rgba(212, 165, 116, 0.2); border-radius: var(--radius);
      margin: 0 16px 20px; padding: 28px 20px; min-height: 320px;
      display: flex; flex-direction: column; justify-content: center;
      animation: fadeSlideUp 0.4s ease;
    }
    @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .question-number { font-size: 11px; color: var(--caramel); font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; }
    .question-text { font-size: 18px; font-weight: 700; line-height: 1.6; margin-bottom: 24px; color: var(--cream); }
    .options { display: flex; flex-direction: column; gap: 10px; }
    .option-btn {
      background: rgba(255,255,255,0.05); border: 1.5px solid rgba(212, 165, 116, 0.25);
      border-radius: var(--radius-sm); padding: 14px 16px; text-align: left;
      font-size: 14px; font-weight: 400; color: var(--cream);
      cursor: pointer; transition: var(--transition); line-height: 1.5; font-family: var(--font-main);
    }
    .option-btn:hover { background: rgba(212, 165, 116, 0.15); border-color: var(--caramel); transform: translateY(-1px); }
    .option-btn:active { transform: translateY(0) scale(0.98); }
    .option-btn.selected { background: rgba(212, 165, 116, 0.2); border-color: var(--caramel); font-weight: 500; }
    .option-label {
      display: inline-block; width: 24px; height: 24px; border-radius: 50%;
      background: rgba(212, 165, 116, 0.2); text-align: center; line-height: 24px;
      font-size: 12px; font-weight: 700; color: var(--caramel); margin-right: 10px; flex-shrink: 0;
    }
    .option-content { display: flex; align-items: center; }
    .nav-buttons { display: flex; gap: 12px; padding: 0 16px 32px; }
    .nav-btn {
      flex: 1; padding: 14px 20px; border-radius: var(--radius-sm);
      font-size: 15px; font-weight: 700; cursor: pointer; transition: var(--transition);
      font-family: var(--font-main); border: none;
    }
    .nav-btn-back { background: rgba(255,255,255,0.08); color: var(--coffee-lighter); flex: 0.6; }
    .nav-btn-back:hover { background: rgba(255,255,255,0.15); }
    .nav-btn-next { background: linear-gradient(135deg, var(--caramel) 0%, #C8956C 100%); color: var(--coffee-darkest); }
    .nav-btn-next:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(212, 165, 116, 0.4); }
    .nav-btn-next:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
    .nav-btn-start {
      background: linear-gradient(135deg, var(--caramel) 0%, #C8956C 100%);
      color: var(--coffee-darkest); font-size: 17px; padding: 16px 40px;
      border-radius: 50px; border: none; font-weight: 700; cursor: pointer;
      transition: var(--transition); font-family: var(--font-main);
    }
    .nav-btn-start:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(212, 165, 116, 0.5); }
    .start-screen { text-align: center; padding: 40px 24px; animation: fadeSlideUp 0.5s ease; }
    .start-screen .bean-icon { font-size: 80px; display: block; margin-bottom: 20px; animation: floatBean 3s ease-in-out infinite; }
    .start-screen h2 { font-size: 26px; font-weight: 900; background: linear-gradient(135deg, var(--caramel) 0%, var(--caramel-light) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 16px; }
    .start-screen .desc { font-size: 14px; color: var(--coffee-lighter); line-height: 1.8; margin-bottom: 32px; font-weight: 300; }
    .start-screen .rules { background: rgba(255,255,255,0.05); border-radius: var(--radius-sm); padding: 16px; margin-bottom: 32px; text-align: left; }
    .start-screen .rules li { font-size: 13px; color: var(--coffee-light); line-height: 2; list-style: none; padding-left: 20px; position: relative; }
    .start-screen .rules li::before { content: '☕'; position: absolute; left: 0; font-size: 10px; }
    .result-screen { padding: 24px 16px 32px; animation: fadeSlideUp 0.6s ease; }
    .result-card {
      background: linear-gradient(135deg, rgba(212,165,116,0.15) 0%, rgba(93,64,55,0.3) 100%);
      border: 1.5px solid rgba(212,165,116,0.3); border-radius: var(--radius);
      padding: 32px 20px; text-align: center; margin-bottom: 24px; position: relative; overflow: hidden;
    }
    .result-card::before {
      content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
      background: radial-gradient(circle, rgba(212,165,116,0.08) 0%, transparent 60%);
      animation: resultGlow 4s ease-in-out infinite;
    }
    @keyframes resultGlow { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(20px, -20px); } }
    .result-emoji { font-size: 64px; display: block; margin-bottom: 16px; position: relative; }
    .result-identity {
      font-size: 24px; font-weight: 900;
      background: linear-gradient(135deg, var(--caramel) 0%, var(--caramel-light) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 8px; position: relative;
    }
    .result-tagline { font-size: 13px; color: var(--coffee-lighter); font-weight: 300; margin-bottom: 20px; position: relative; }
    .result-desc { font-size: 14px; color: var(--cream); line-height: 1.8; text-align: left; background: rgba(0,0,0,0.2); border-radius: var(--radius-sm); padding: 16px; margin-bottom: 16px; position: relative; }
    .result-flavor { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; position: relative; margin-bottom: 16px; }
    .flavor-tag { background: rgba(212,165,116,0.2); border: 1px solid rgba(212,165,116,0.3); border-radius: 20px; padding: 4px 12px; font-size: 12px; color: var(--caramel-light); }
    .result-encourage { font-size: 13px; color: var(--caramel); font-weight: 500; font-style: italic; position: relative; }
    .share-section { margin-bottom: 24px; }
    .share-section h3 { font-size: 15px; font-weight: 700; color: var(--caramel); margin-bottom: 12px; text-align: center; }
    .share-buttons { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .share-btn {
      background: rgba(255,255,255,0.08); border: 1.5px solid rgba(212,165,116,0.3);
      border-radius: var(--radius-sm); padding: 10px 16px; color: var(--cream);
      font-size: 13px; font-weight: 500; cursor: pointer; transition: var(--transition);
      font-family: var(--font-main); display: flex; align-items: center; gap: 6px;
    }
    .share-btn:hover { background: rgba(212,165,116,0.2); border-color: var(--caramel); }
    .share-btn .share-icon { font-size: 16px; }
    .result-actions { display: flex; gap: 12px; }
    .result-actions .nav-btn { text-align: center; }
    #share-canvas { display: none; }
    .toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(100px);
      background: rgba(42,26,14,0.95); border: 1px solid rgba(212,165,116,0.4);
      border-radius: var(--radius-sm); padding: 12px 24px; color: var(--caramel-light);
      font-size: 14px; font-weight: 500; z-index: 999; transition: transform 0.3s ease; backdrop-filter: blur(10px);
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    @media (max-width: 400px) {
      .header h1 { font-size: 18px; }
      .question-text { font-size: 16px; }
      .result-identity { font-size: 20px; }
    }
    .loading-mask { position: fixed; inset: 0; background: var(--coffee-darkest); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.5s ease; }
    .loading-mask.fade-out { opacity: 0; pointer-events: none; }
    .loading-bean { font-size: 48px; animation: floatBean 1.5s ease-in-out infinite; }
    .loading-text { margin-top: 16px; color: var(--caramel); font-size: 13px; letter-spacing: 2px; font-weight: 300; }
    .share-img-preview {
      position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none;
      align-items: center; justify-content: center; z-index: 9999; padding: 20px;
    }
    .share-img-preview.show { display: flex; }
    .share-img-preview img { max-width: 100%; max-height: 80vh; border-radius: var(--radius); box-shadow: var(--shadow-strong); }
    .share-img-preview .close-btn { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.2); border: none; color: white; width: 36px; height: 36px; border-radius: 50%; font-size: 18px; cursor: pointer; }
    .share-img-preview .save-tip {
      position: absolute;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(212, 165, 116, 0.95);
      color: var(--coffee-darkest);
      padding: 12px 28px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 700;
      text-align: center;
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
      white-space: nowrap;
      z-index: 10;
    }
    .url-share-box { background: rgba(255,255,255,0.05); border-radius: var(--radius-sm); padding: 12px 16px; margin-top: 12px; word-break: break-all; font-size: 12px; color: var(--coffee-light); border: 1px solid rgba(212,165,116,0.2); }
  </style>
</head>
<body>
  <div class="loading-mask" id="loading-mask">
    <div class="loading-bean">☕</div>
    <div class="loading-text">正在研磨...</div>
  </div>

  <div id="app">
    <div class="header">
      <span class="header-icon">☕</span>
      <h1>咖啡身份认领测试</h1>
      <p>15道题，测出你是哪种咖啡人</p>
    </div>
    <div class="progress-wrap" id="progress-wrap" style="display:none;">
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="progress-text" id="progress-text"></div>
    </div>
    <div id="content"></div>
    <div class="nav-buttons" id="nav-buttons" style="display:none;"></div>
  </div>

    <div class="share-img-preview" id="share-preview">
    <button class="close-btn" onclick="closeSharePreview()">&times;</button>
    <img id="share-preview-img" src="" alt="分享图">
    <div class="save-tip" id="save-tip">长按图片，保存到相册</div>
  </div>

  <canvas id="share-canvas" width="750" height="1000" style="display:none;"></canvas>
  <div class="toast" id="toast"></div>

<script>
// ===== Questions =====
const questions = [
  {
    q: "早上起床，你离了咖啡活不了，第一杯一般几点喝？",
    options: [
      { text: "睁眼就冲，刷牙前已经美式到位", ids: ["americano_loner"] },
      { text: "到公司第一件事，打卡+冲咖啡同步进行", ids: ["americano_loner", "morning_zombie"] },
      { text: "不急，上午慢悠悠来一杯拿铁，配个早餐", ids: ["latte_anything"] },
      { text: "周末才喝，工作日？矿泉水谢谢", ids: ["coffee_fortune_teller"] }
    ]
  },
  {
    q: "你喝咖啡加糖吗？",
    options: [
      { text: "加糖？那还叫喝咖啡吗", ids: ["espresso_essence"] },
      { text: "偶尔加，但要有仪式感地慢慢品", ids: ["pourover_philosopher"] },
      { text: "必须加，不甜不喝", ids: ["mocha_sweetie", "caramel_princess"] },
      { text: "看心情，今天苦明天甜", ids: ["espresso_debater"] }
    ]
  },
  {
    q: "你一般在哪里喝咖啡？",
    options: [
      { text: "公司工位，一天坐到晚", ids: ["americano_loner", "ice_americano_survivor"] },
      { text: "专门探店，每周至少3家新咖啡馆", ids: ["cafe_vagrant_poet"] },
      { text: "家里沙发，穿着睡衣慢慢喝", ids: ["pourover_philosopher"] },
      { text: "随身携带，走路喝、坐车喝、开会也喝", ids: ["ice_americano_survivor"] }
    ]
  },
  {
    q: "你喝的都是什么温度的咖啡？",
    options: [
      { text: "只喝冰的，热咖啡是什么上古生物", ids: ["ice_americano_survivor"] },
      { text: "热饮派，冬天捧着杯子才有感觉", ids: ["latte_anything"] },
      { text: "都行，主要看心情和天气", ids: ["coffee_fortune_teller"] },
      { text: "冷萃屯一冰箱，随取随喝", ids: ["coldbrew_hoarder"] }
    ]
  },
  {
    q: "你对咖啡豆产地有研究吗？",
    options: [
      { text: "必须研究，巴拿马瑰夏和埃塞俄比亚耶加雪菲区别能讲一小时", ids: ["geisha_snob"] },
      { text: "知道一点，但主要还是看口味", ids: ["pourover_philosopher"] },
      { text: "云南小粒也很香，支持国货", ids: ["yunnan_ambassador"] },
      { text: "豆子？咖啡粉不行吗", ids: ["morning_zombie"] }
    ]
  },
  {
    q: "你喝拿铁/奶咖吗？",
    options: [
      { text: "拿铁是我本命，万物皆可拿铁", ids: ["latte_anything"] },
      { text: "燕麦拿铁，乳糖不耐受但绝不认输", ids: ["oat_latte_believer"] },
      { text: "偶尔喝，主要还是美式", ids: ["americano_loner"] },
      { text: "奶泡打得比人生还厚，我就是要奶味", ids: ["milk_napoleon"] }
    ]
  },
  {
    q: "你买咖啡豆/咖啡粉的习惯是？",
    options: [
      { text: "买了一堆，开了一包，其他在柜子里吃灰", ids: ["bean_collector"] },
      { text: "只买贵的，性价比是什么", ids: ["geisha_snob"] },
      { text: "随便买，能喝就行", ids: ["espresso_essence"] },
      { text: "自带挂耳，省钱又体面", ids: ["yunnan_ambassador"] }
    ]
  },
  {
    q: "咖啡对你来说意味着什么？",
    options: [
      { text: "续命，没有咖啡下午怎么活", ids: ["ice_americano_survivor"] },
      { text: "生活仪式感，慢慢享受", ids: ["pourover_philosopher"] },
      { text: "社交工具，约人见面就喝咖啡", ids: ["cafe_vagrant_poet"] },
      { text: "占卜工具，今天喝什么咖啡代表今天运势", ids: ["coffee_fortune_teller"] }
    ]
  },
  {
    q: "你能接受多苦的咖啡？",
    options: [
      { text: "浓缩shots一口闷，苦是灵魂", ids: ["espresso_essence"] },
      { text: "中深烘可以，但太焦的不行", ids: ["espresso_debater"] },
      { text: "必须加奶，纯黑咖啡接受不了", ids: ["milk_napoleon"] },
      { text: "摩卡走起，巧克力味才是咖啡", ids: ["mocha_sweetie"] }
    ]
  },
  {
    q: "你喝过最贵的咖啡是多少钱一杯？",
    options: [
      { text: "50以上，喝的是产地和故事", ids: ["geisha_snob"] },
      { text: "30左右，偶尔奢侈一下", ids: ["flatwhite_cool"] },
      { text: "20以内，瑞幸/库迪常客", ids: ["ice_americano_survivor"] },
      { text: "自带挂耳，省钱又体面", ids: ["yunnan_ambassador"] }
    ]
  },
  {
    q: "你的咖啡器具到了什么级别？",
    options: [
      { text: "虹吸壶、手冲架、电子秤、温度计，煮咖啡像炼丹", ids: ["siphon_ritual_master"] },
      { text: "一个法压壶或手冲杯，够用了", ids: ["pourover_philosopher"] },
      { text: "速溶+杯子，简单粗暴", ids: ["morning_zombie"] },
      { text: "买了很多，用得很少，主要用来拍照", ids: ["bean_collector"] }
    ]
  },
  {
    q: "你对季节限定咖啡怎么看？",
    options: [
      { text: "秋天不喝桂花拿铁，秋天有什么意义", ids: ["seasonal_hunter"] },
      { text: "还行，出新品会试试", ids: ["cafe_vagrant_poet"] },
      { text: "都是营销，味道没差多少", ids: ["espresso_debater"] },
      { text: "不知道有这回事", ids: ["coffee_fortune_teller"] }
    ]
  },
  {
    q: "你会在朋友圈/小红书晒咖啡吗？",
    options: [
      { text: "每周必晒，打卡比上班还勤", ids: ["cafe_vagrant_poet"] },
      { text: "偶尔晒，好看的才晒", ids: ["bean_collector"] },
      { text: "不晒，喝了就喝了", ids: ["americano_loner"] },
      { text: "晒，但主要晒杯子/器具，咖啡是配角", ids: ["siphon_ritual_master"] }
    ]
  },
  {
    q: "你喝flat white吗？",
    options: [
      { text: "超爱，不说美式不说拿铁，flat white才有格调", ids: ["flatwhite_cool"] },
      { text: "喝过，但觉得就是小杯拿铁", ids: ["espresso_debater"] },
      { text: "没听过，这是什么", ids: ["morning_zombie"] },
      { text: "燕麦flat white，乳糖不耐受进阶版", ids: ["oat_latte_believer"] }
    ]
  },
  {
    q: "如果咖啡从世界上消失了，你会？",
    options: [
      { text: "崩溃，第二天就去找替代品", ids: ["ice_americano_survivor"] },
      { text: "遗憾，但茶也可以", ids: ["pourover_philosopher"] },
      { text: "无所谓，本来就不常喝", ids: ["coffee_fortune_teller"] },
      { text: "终于可以省钱了，但还是会想念", ids: ["yunnan_ambassador"] }
    ]
  }
];

// ===== Identities =====
const identities = {
  americano_loner: {
    name: "美式孤勇者",
    emoji: "\u2615",
    tagline: "什么都不加，就硬喝",

// ===== State =====
let currentQ = 0;
let answers = [];
let resultId = null;

// ===== Init =====
function init() {
  try {
    var hash = window.location.hash;
    if (hash && hash.startsWith("#result=")) {
      var sharedId = hash.replace("#result=", "");
      if (identities[sharedId]) {
        showResult(sharedId, true);
        setTimeout(function() {
          var mask = document.getElementById("loading-mask");
          if (mask) mask.classList.add("fade-out");
        }, 500);
        return;
      }
    }
    setTimeout(function() {
      var mask = document.getElementById("loading-mask");
      if (mask) mask.classList.add("fade-out");
      setTimeout(function() {
        var mask2 = document.getElementById("loading-mask");
        if (mask2) mask2.style.display = "none";
        showStartScreen();
      }, 600);
    }, 1000);
  } catch(e) {
    // fallback: hide loading mask and show start screen
    var mask = document.getElementById("loading-mask");
    if (mask) mask.style.display = "none";
    showStartScreen();
  }
}

// ===== Start Screen =====
function showStartScreen() {
  currentQ = 0;
  answers = [];
  resultId = null;
  var progressWrap = document.getElementById("progress-wrap");
  if (progressWrap) progressWrap.style.display = "none";
  var navButtons = document.getElementById("nav-buttons");
  if (navButtons) navButtons.style.display = "none";
  document.getElementById("content").innerHTML =
    '<div class="start-screen">' +
    '<span class="bean-icon">\u2615</span>' +
    '<h2>测测你是哪种<br>"咖啡人"？</h2>' +
    '<p class="desc">15道有趣的选择题<br>认领你的专属咖啡身份<br>测完可以生成分享卡片哦～</p>' +
    '<div class="rules">' +
      '<li>共 15 道题，每题选择最符合你的选项</li>' +
      '<li>不需要登录，点开就能测</li>' +
      '<li>测完生成专属咖啡身份卡</li>' +
      '<li>支持分享给朋友一起测</li>' +
    '</div>' +
    '<button class="nav-btn-start" onclick="startQuiz()">开始测试 \u2615</button>' +
    '</div>';
}

function startQuiz() {
  var progressWrap = document.getElementById("progress-wrap");
  if (progressWrap) progressWrap.style.display = "";
  var navButtons = document.getElementById("nav-buttons");
  if (navButtons) navButtons.style.display = "";
  showQuestion(0);
}

// ===== Question =====
function showQuestion(idx) {
  currentQ = idx;
  var q = questions[idx];
  var progress = ((idx) / questions.length * 100).toFixed(0);
  var fill = document.getElementById("progress-fill");
  if (fill) fill.style.width = progress + "%";
  var text = document.getElementById("progress-text");
  if (text) text.textContent = (idx + 1) + " / " + questions.length;

  var selected = answers[idx] !== undefined;
  var html = '<div class="question-card">' +
    '<div class="question-number">QUESTION ' + (idx + 1) + '</div>' +
    '<div class="question-text">' + q.q + '</div>' +
    '<div class="options">';
  for (var i = 0; i < q.options.length; i++) {
    var opt = q.options[i];
    var isSelected = answers[idx] === i;
    html += '<button class="option-btn' + (isSelected ? ' selected' : '') + '" onclick="selectOption(' + idx + ',' + i + ')">' +
      '<div class="option-content">' +
        '<span class="option-label">' + String.fromCharCode(65 + i) + '</span>' +
        '<span>' + opt.text + '</span>' +
      '</div>' +
      '</button>';
  }
  html += '</div></div>';
  document.getElementById("content").innerHTML = html;
  renderNav(idx, selected);
}

function selectOption(qIdx, optIdx) {
  answers[qIdx] = optIdx;
  showQuestion(qIdx);
}

function renderNav(idx, hasSelected) {
  var isFirst = idx === 0;
  var isLast = idx === questions.length - 1;
  var html = "";
  if (!isFirst) {
    html += '<button class="nav-btn nav-btn-back" onclick="showQuestion(' + (idx - 1) + ')">\u2190 上一题</button>';
  } else {
    html += '<div style="flex:0.6;"></div>';
  }
  if (!isLast) {
    html += '<button class="nav-btn nav-btn-next" onclick="showQuestion(' + (idx + 1) + ')"' + (hasSelected ? '' : ' disabled') + '>下一题 \u2192</button>';
  } else {
    html += '<button class="nav-btn nav-btn-next" onclick="calculateResult()"' + (hasSelected ? '' : ' disabled') + '>\u2728 查看结果</button>';
  }
  document.getElementById("nav-buttons").innerHTML = html;
}

// ===== Calculate Result =====
function calculateResult() {
  var scores = {};
  for (var i = 0; i < answers.length; i++) {
    var optIdx = answers[i];
    if (optIdx === undefined) continue;
    var ids = questions[i].options[optIdx].ids;
    for (var j = 0; j < ids.length; j++) {
      var id = ids[j];
      scores[id] = (scores[id] || 0) + 1;
    }
  }
  var topId = null;
  var topScore = -1;
  var keys = Object.keys(scores);
  for (var k = 0; k < keys.length; k++) {
    var key = keys[k];
    if (scores[key] > topScore) {
      topScore = scores[key];
      topId = key;
    }
  }
  if (!topId) {
    keys = Object.keys(identities);
    topId = keys[Math.floor(Math.random() * keys.length)];
  }
  showResult(topId, false);
}

// ===== Show Result =====
function showResult(id, fromHash) {
  resultId = id;
  var identity = identities[id];
  var progressWrap = document.getElementById("progress-wrap");
  if (progressWrap) progressWrap.style.display = "none";
  var navButtons = document.getElementById("nav-buttons");
  if (navButtons) navButtons.style.display = "none";

  var shareUrl = window.location.origin + window.location.pathname + "#result=" + id;

  var html = '<div class="result-screen">' +
    '<div class="result-card" id="result-card">' +
      '<span class="result-emoji">' + identity.emoji + '</span>' +
      '<div class="result-identity">' + identity.name + '</div>' +
      '<div class="result-tagline">' + identity.tagline + '</div>' +
      '<div class="result-desc">' + identity.desc + '</div>' +
      '<div class="result-flavor">';
  for (var i = 0; i < identity.flavors.length; i++) {
    html += '<span class="flavor-tag">' + identity.flavors[i] + '</span>';
  }
  html += '</div>' +
      '<div class="result-encourage">' + identity.encourage + '</div>' +
    '</div>' +

    '<div class="share-section">' +
      '<h3>\uD83D\uDCD4 分享你的咖啡身份</h3>' +
      '<div class="share-buttons">' +
        '<button class="share-btn" onclick="generateShareImage()">' +
          '<span class="share-icon">\uD83D\uDCC8</span> 生成分享图' +
        '</button>' +
        '<button class="share-btn" onclick="copyShareLink()">' +
          '<span class="share-icon">\uD83D\uDD17</span> 复制分享链接' +
        '</button>' +
        '<button class="share-btn" onclick="copyShareText()">' +
          '<span class="share-icon">\uD83D\uDCCB</span> 复制文案' +
        '</button>' +
      '</div>' +
    '</div>' +

    '<div class="result-actions">' +
      '<button class="nav-btn nav-btn-back" onclick="showStartScreen()" style="flex:1;">重新测试</button>' +
      '<button class="nav-btn nav-btn-next" onclick="shareToFriend()" style="flex:1;">分享给朋友</button>' +
    '</div>' +
  '</div>';

  document.getElementById("content").innerHTML = html;

  // Update URL hash
  if (!fromHash) {
    window.location.hash = "result=" + id;
  }
  window.scrollTo({ top: 0, behavior: "smooth" });
}

// ===== Share: Generate Image =====
function generateShareImage() {
  var identity = identities[resultId];
  var canvas = document.getElementById("share-canvas");
  if (!canvas) return;
  var ctx = canvas.getContext("2d");
  if (!ctx) return;

  // Background
  var grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  grad.addColorStop(0, "#2A1A0E");
  grad.addColorStop(0.5, "#3E2723");
  grad.addColorStop(1, "#5D4037");
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Decorative circle
  ctx.globalAlpha = 0.08;
  ctx.beginPath();
  ctx.arc(600, 200, 200, 0, Math.PI * 2);
  ctx.fillStyle = "#D4A574";
  ctx.fill();
  ctx.globalAlpha = 1;

  // Title
  ctx.fillStyle = "#D4A574";
  ctx.font = "bold 20px 'Noto Sans SC', sans-serif";
  ctx.textAlign = "center";
  ctx.fillText("我的咖啡身份是", canvas.width / 2, 80);

  // Emoji
  ctx.font = "80px serif";
  ctx.fillText(identity.emoji, canvas.width / 2, 200);

  // Identity Name
  ctx.fillStyle = "#F5CBA7";
  ctx.font = "bold 36px 'Noto Sans SC', sans-serif";
  ctx.fillText(identity.name, canvas.width / 2, 280);

  // Tagline
  ctx.fillStyle = "#D7CCC8";
  ctx.font = "18px 'Noto Sans SC', sans-serif";
  ctx.fillText(identity.tagline, canvas.width / 2, 330);

  // Divider
  ctx.strokeStyle = "rgba(212, 165, 116, 0.4)";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(100, 370);
  ctx.lineTo(650, 370);
  ctx.stroke();

  // Description - word wrap
  ctx.fillStyle = "#FEF9EF";
  ctx.font = "15px 'Noto Sans SC', sans-serif";
  var descLines = wrapText(ctx, identity.desc, 80, 420, 590);
  for (var i = 0; i < descLines.length; i++) {
    ctx.fillText(descLines[i], canvas.width / 2, 420 + i * 26);
  }

  // Flavor tags
  ctx.font = "14px 'Noto Sans SC', sans-serif";
  var tagText = identity.flavors.join("  \u00B7  ");
  ctx.fillStyle = "#D4A574";
  ctx.fillText(tagText, canvas.width / 2, 420 + descLines.length * 26 + 40);

  // Encourage
  ctx.fillStyle = "#D4A574";
  ctx.font = "italic 14px 'Noto Sans SC', sans-serif";
  var encLines = wrapText(ctx, identity.encourage, 100, 420 + descLines.length * 26 + 80, 550);
  for (var i2 = 0; i2 < encLines.length; i2++) {
    ctx.fillText(encLines[i2], canvas.width / 2, 420 + descLines.length * 26 + 80 + i2 * 24);
  }

  // Footer
  ctx.fillStyle = "rgba(215, 204, 200, 0.6)";
  ctx.font = "13px 'Noto Sans SC', sans-serif";
  ctx.fillText("\u2615 咖啡身份认领测试 \u00B7 来测测你的咖啡人格吧", canvas.width / 2, canvas.height - 50);

  // Show preview - 使用 toBlob + createObjectURL（避免手机端处理超长Base64失败）
  canvas.toBlob(function(blob) {
    if (!blob) {
      showToast("生成分享图失败，请重试");
      return;
    }
    var url = URL.createObjectURL(blob);
    var previewImg = document.getElementById("share-preview-img");
    if (previewImg) {
      previewImg.src = url;
      // 保存 URL 引用，关闭弹窗时释放
      previewImg.dataset.blobUrl = url;
    }
    var preview = document.getElementById("share-preview");
    if (preview) preview.classList.add("show");
    
    // 检测是否微信浏览器，显示对应提示
    var isWechat = /MicroMessenger/i.test(navigator.userAgent);
    var tip = document.getElementById("save-tip");
    if (tip) {
      if (isWechat) {
        tip.textContent = "👆 长按上方图片，选择【保存到相册】";
        tip.style.display = "block";
      } else {
        tip.textContent = "点击按钮保存，或长按图片保存";
        tip.style.display = "block";
      }
    }
  }, "image/png");
}

function wrapText(ctx, text, x, y, maxWidth) {
  var lines = [];
  var line = "";
  for (var i = 0; i < text.length; i++) {
    var testLine = line + text[i];
    var metrics = ctx.measureText(testLine);
    if (metrics.width > maxWidth && line.length > 0) {
      lines.push(line);
      line = text[i];
    } else {
      line = testLine;
    }
  }
  if (line) lines.push(line);
  return lines;
}

function closeSharePreview() {
  var preview = document.getElementById("share-preview");
  if (preview) preview.classList.remove("show");
  
  // 释放 Blob URL，避免内存泄漏
  var previewImg = document.getElementById("share-preview-img");
  if (previewImg) {
    if (previewImg.dataset.blobUrl) {
      URL.revokeObjectURL(previewImg.dataset.blobUrl);
      previewImg.dataset.blobUrl = "";
    }
  }
}

function downloadShareImg() {
  // 优先使用已生成的 Blob URL（避免重复生成）
  var previewImg = document.getElementById("share-preview-img");
  var existingUrl = previewImg ? previewImg.dataset.blobUrl : null;
  
  // 检测是否微信浏览器
  var isWechat = /MicroMessenger/i.test(navigator.userAgent);
  
  if (isWechat) {
    // ========== 微信浏览器：引导用户长按保存 ==========
    // 确保弹窗已显示
    var preview = document.getElementById("share-preview");
    if (preview && !preview.classList.contains("show")) {
      preview.classList.add("show");
    }
    
    // 确保图片已加载
    if (previewImg && !previewImg.src && existingUrl) {
      previewImg.src = existingUrl;
    }
    
    // 显示明显提示
    var tip = document.getElementById("save-tip");
    if (tip) {
      tip.textContent = "👆 长按上方图片，选择【保存到相册】";
      tip.style.display = "block";
    }
    
    showToast("请长按图片，选择保存到相册");
    return;
  }
  
  // ========== 非微信浏览器：尝试触发下载 ==========
  function doDownload(blobUrl) {
    var link = document.createElement("a");
    link.href = blobUrl;
    link.download = "我的咖啡身份_" + (resultId || "unknown") + ".png";
    link.style.display = "none";
    link.target = "_blank";  // 某些浏览器需要
    
    document.body.appendChild(link);
    
    // 兼容更多浏览器
    if (link.click) {
      link.click();
    } else {
      // Fallback：手动触发事件
      var evt = document.createEvent("MouseEvents");
      evt.initMouseEvent("click", true, true, window, 0, 0, 0, 0, 0, false, false, false, false, 0, null);
      link.dispatchEvent(evt);
    }
    
    // 延迟移除并释放
    setTimeout(function() {
      if (link.parentNode) {
        try { document.body.removeChild(link); } catch(e) {}
      }
      // 如果是新生成的 URL（不是复用的），释放它
      if (blobUrl !== existingUrl) {
        URL.revokeObjectURL(blobUrl);
      }
    }, 1000);
    
    showToast("图片已保存！快去发朋友圈吧 ☕");
  }
  
  if (existingUrl) {
    // 复用已生成的 URL
    doDownload(existingUrl);
  } else {
    // 新生成 Blob
    var canvas = document.getElementById("share-canvas");
    if (!canvas) {
      showToast("未找到分享图，请先生成分享图");
      return;
    }
    
    canvas.toBlob(function(blob) {
      if (!blob) {
        showToast("生成图片失败，请重试");
        return;
      }
      
      var url = URL.createObjectURL(blob);
      
      // 保存引用
      if (previewImg) {
        previewImg.src = url;
        previewImg.dataset.blobUrl = url;
      }
      
      doDownload(url);
    }, "image/png");
  }
}

// ===== Share: Copy Link =====
function copyShareLink() {
  var shareUrl = window.location.origin + window.location.pathname + "#result=" + resultId;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(shareUrl).then(function() {
      showToast("\u94FE\u63A5\u5DF2\u590D\u5236\u5230\u526A\u8D34\u677F\uFF01\u5FEB\u53BB\u5206\u4EAB\u5427 \uD83D\uDD17");
    }).catch(function() {
      fallbackCopy(shareUrl);
    });
  } else {
    fallbackCopy(shareUrl);
  }
}

function fallbackCopy(text) {
  var input = document.createElement("input");
  input.value = text;
  document.body.appendChild(input);
  input.select();
  document.execCommand("copy");
  document.body.removeChild(input);
  showToast("\u94FE\u63A5\u5DF2\u590D\u5236\uFF01\u5FEB\u53BB\u5206\u4EAB\u5427 \uD83D\uDD17");
}

// ===== Share: Copy Text =====
function copyShareText() {
  var identity = identities[resultId];
  var text = "\u2615 \u6211\u7684\u5496\u5561\u8EAB\u4EFD\u662F\uFF1A\u3010" + identity.name + "\u3011\n\u300C" + identity.tagline + "\u300D\n\n\u6765\u6D4B\u6D4B\u4F60\u7684\u5496\u5561\u4EBA\u683C\u5427\uFF01";
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() {
      showToast("\u6587\u6848\u5DF2\u590D\u5236\uFF01\u5FEB\u53BB\u53D1\u670B\u53CB\u5708\u5427 \uD83D\uDCCB");
    }).catch(function() {
      fallbackCopy(text);
    });
  } else {
    fallbackCopy(text);
  }
}

// ===== Share: Share to Friend =====
function shareToFriend() {
  var identity = identities[resultId];
  var shareUrl = window.location.origin + window.location.pathname + "#result=" + resultId;
  var text = "\u2615 \u6211\u7684\u5496\u5561\u8EAB\u4EFD\u662F\uFF1A\u3010" + identity.name + "\u3011\u2014\u2014" + identity.tagline + "\uFF01\u6765\u6D4B\u6D4B\u4F60\u7684\u5496\u5561\u4EBA\u683C\u5427\uFF01" + shareUrl;
  if (navigator.share) {
    navigator.share({
      title: "\u5496\u5561\u8EAB\u4EFD\u8BA4\u9886\u6D4B\u8BD5",
      text: text,
      url: shareUrl
    }).catch(function() {});
  } else {
    copyShareLink();
  }
}

// ===== Toast =====
function showToast(msg) {
  var toast = document.getElementById("toast");
  if (!toast) return;
  toast.textContent = msg;
  toast.classList.add("show");
  setTimeout(function() { toast.classList.remove("show"); }, 2500);
}

// ===== Start =====
if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", init);
} else {
  init();
}
</script>
